<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qantas Crash Sim</title>
    
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.2/dist/aframe-physics-system.min.js"></script>
    
    <style>
        .label {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 20px;
            border-radius: 50px;
            font-family: sans-serif;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 100; /* Keeps it in front of the 3D canvas */
        }
    </style>
</head>
<body>

    <div class="label">Physics Sim: Qantas Plane Drop</div>

    <a-scene physics="gravity: -9.8">
        
        <a-assets>
            <a-asset-item id="plane-model" src="Meshy_AI_Qantas_Spirit_of_Aust_0514190259_texture.glb"></a-asset-item>
        </a-assets>

        <a-entity 
            gltf-model="#plane-model" 
            position="0 20 -15" 
            scale="1 1 1" 
            dynamic-body="shape: box">
        </a-entity>

        <a-plane 
            position="0 0 -15" 
            rotation="-90 0 0" 
            width="100" 
            height="100" 
            color="#5c5c5c" 
            static-body>
        </a-plane>

        <a-sky color="#87CEEB"></a-sky>

        <a-entity camera look-controls position="0 2 0"></a-entity>

    </a-scene>

</body>
</html>
